<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>JSON Fixer & Beautifier Otomatis | By Ismi Azis</title>
    <meta name="description" content="Alat bantu untuk merapikan dan memperbaiki JSON rusak secara otomatis. Dikembangkan oleh Ismi Azis (QA Engineer).">
    <meta name="keywords" content="JSON Beautifier, JSON Repair, Fix JSON, Ismi Azis, QA Automation, JSON Formatter Online">
    <meta name="author" content="Ismi Azis">
    <link rel="author" href="https://github.com/ismiazis96/">
    
    <meta property="og:title" content="JSON Fixer & Beautifier Otomatis - Ismi Azis">
    <meta property="og:description" content="Perbaiki format JSON yang rusak dan rapikan struktur data dalam satu klik.">
    <meta property="og:url" content="https://github.com/ismiazis96/">
    <meta property="og:type" content="website">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "JSON Fixer & Beautifier",
      "applicationCategory": "DeveloperApplication",
      "author": {
        "@type": "Person",
        "name": "Ismi Azis",
        "url": "https://www.linkedin.com/in/ismiazis96/",
        "sameAs": [
          "https://github.com/ismiazis96/",
          "https://www.linkedin.com/in/ismiazis96/"
        ]
      }
    }
    </script>

    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        .container { 
            width: 95%; 
            max-width: 1200px; 
            margin: 20px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex: 1;
        }

        h2 { margin-top: 0; color: #333; display: flex; align-items: center; gap: 10px; }
        
        textarea { 
            width: 100%; 
            height: 60vh; /* Sangat lega untuk data besar */
            min-height: 400px; 
            font-family: 'Cascadia Code', 'Consolas', monospace; 
            padding: 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            resize: vertical; 
            font-size: 14px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: var(--primary-color); }

        .controls { 
            margin-top: 20px; 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
        }

        button { 
            padding: 12px 24px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-main { background: var(--primary-color); color: white; }
        .btn-main:hover { background: #0056b3; transform: translateY(-1px); }
        
        .btn-undo { background: var(--secondary-color); color: white; }
        .btn-undo:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-copy { background: var(--success-color); color: white; margin-left: auto; }
        .btn-clear { background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); }

        .status { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 6px; 
            font-size: 0.95em; 
            display: none; 
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #333;
            color: white;
            margin-top: 40px;
        }

        footer a { color: #00d1b2; text-decoration: none; font-weight: bold; }
        .social-links { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .badge { height: 28px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ JSON Fixer & Beautifier</h2>
    <p style="color: #666; margin-bottom: 20px;">Rapikan format JSON dan perbaiki error kutip/koma secara otomatis.</p>
    
    <textarea id="jsonInput" placeholder="Tempel JSON mentah di sini..."></textarea>
    
    <div class="controls">
        <button class="btn-main" onclick="processJSON()">🚀 Format & Perbaiki</button>
        <button class="btn-undo" id="undoBtn" onclick="undo()" disabled>↩️ Undo</button>
        <button class="btn-undo" id="redoBtn" onclick="redo()" disabled>↪️ Redo</button>
        
        <button class="btn-copy" onclick="copyJSON()">📋 Salin Hasil</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ Hapus</button>
    </div>

    <div id="status" class="status"></div>
</div>

<footer>
    <p>Dikembangkan oleh <strong>Ismi Azis</strong></p>
    <div class="social-links">
        <a href="https://github.com/ismiazis96/" target="_blank">
            <img class="badge" src="https://img.shields.io/badge/GitHub-181717?style=for-the-badge&logo=github&logoColor=white" alt="GitHub Ismi Azis">
        </a>
        <a href="https://www.linkedin.com/in/ismiazis96/" target="_blank">
            <img class="badge" src="https://img.shields.io/badge/LinkedIn-0A66C2?style=for-the-badge&logo=linkedin&logoColor=white" alt="LinkedIn Ismi Azis">
        </a>
    </div>
    <p style="font-size: 0.8em; color: #bbb; margin-top: 10px;">&copy; 2026 Quality Assurance Tools</p>
</footer>

<script>
    const jsonInput = document.getElementById('jsonInput');
    const statusDiv = document.getElementById('status');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');

    let history = [""];
    let historyStep = 0;

    function saveHistory() {
        const currentVal = jsonInput.value;
        if (currentVal === history[historyStep]) return;
        history = history.slice(0, historyStep + 1);
        history.push(currentVal);
        historyStep++;
        updateButtons();
    }

    function updateButtons() {
        undoBtn.disabled = historyStep <= 0;
        redoBtn.disabled = historyStep >= history.length - 1;
    }

    function undo() {
        if (historyStep > 0) {
            historyStep--;
            jsonInput.value = history[historyStep];
            updateButtons();
        }
    }

    function redo() {
        if (historyStep < history.length - 1) {
            historyStep++;
            jsonInput.value = history[historyStep];
            updateButtons();
        }
    }

    function processJSON() {
        let raw = jsonInput.value.trim();
        if (!raw) return;

        try {
            // Logika Auto-Repair
            let fixed = raw
                .replace(/'/g, '"') // ganti single quote
                .replace(/,\s*([\]}])/g, '$1') // hapus trailing comma
                .replace(/([{,]\s*)([a-zA-Z0-9_]+?)\s*:/g, '$1"$2":'); // tambah quote pada key

            const parsed = JSON.parse(fixed);
            jsonInput.value = JSON.stringify(parsed, null, 4);
            
            showStatus("✔ JSON berhasil diperbaiki dan dirapikan!", "success");
            saveHistory();
        } catch (e) {
            showStatus("❌ Gagal memperbaiki: " + e.message, "error");
        }
    }

    function showStatus(msg, type) {
        statusDiv.style.display = "block";
        statusDiv.innerText = msg;
        statusDiv.style.backgroundColor = type === "success" ? "#f0fff4" : "#fff5f5";
        statusDiv.style.color = type === "success" ? "#28a745" : "#dc3545";
        statusDiv.style.border = `1px solid ${type === "success" ? "#9ae6b4" : "#feb2b2"}`;
    }

    function copyJSON() {
        if (!jsonInput.value) return;
        navigator.clipboard.writeText(jsonInput.value);
        alert("JSON telah disalin ke clipboard!");
    }

    function clearAll() {
        if(confirm("Hapus semua teks?")) {
            jsonInput.value = "";
            saveHistory();
            statusDiv.style.display = "none";
        }
    }

    jsonInput.addEventListener('input', () => {
        clearTimeout(window.historyTimer);
        window.historyTimer = setTimeout(saveHistory, 800);
    });
</script>

</body>
</html>
