<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsmiDev Pro | QA & Dev Ultimate Tool</title>
    
    <meta name="description" content="Alat bantu untuk merapikan dan memperbaiki JSON rusak secara otomatis. Dikembangkan oleh Ismi Azis (QA Engineer).">
    <meta name="keywords" content="JSON Beautifier, JSON Repair, Fix JSON, Ismi Azis, QA Automation, JSON Formatter Online, SQL Formatter">
    <meta name="author" content="Ismi Azis">
    <link rel="author" href="https://github.com/ismiazis96/">
    
    <meta property="og:title" content="JSON Fixer & Beautifier Otomatis - Ismi Azis">
    <meta property="og:description" content="Perbaiki format JSON yang rusak dan rapikan struktur data dalam satu klik.">
    <meta property="og:url" content="https://github.com/ismiazis96/">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="css/css2.css">
    <script src="js/crypto-js.min.js"></script>
    <script src="js/lucide.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0b0f1a;
            --card-bg: #161b2c;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #2d334a;
            --accent: #22d3ee;
            /* Syntax Colors */
            --j-key: #f87171;    --j-string: #4ade80; 
            --j-num: #fbbf24;    --j-bool: #60a5fa;   
            --j-null: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); 
            color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh;
        }

        nav { 
            background: rgba(22, 27, 44, 0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 0 2rem;
            display: flex; align-items: center; position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-right: 3rem;
        }

        .tab-btn {
            padding: 1.2rem 1rem; border: none; background: none; color: var(--text-muted);
            cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;
            border-bottom: 2px solid transparent; font-size: 0.9rem;
        }

        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .container { width: 95%; max-width: 1200px; margin: 30px auto; flex: 1; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        .page { display: none; animation: slideUp 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .editor-wrapper { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 992px) { .editor-wrapper { grid-template-columns: 1fr 1fr; } }

        .editor-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 992px) { .editor-grid { grid-template-columns: 1fr 1fr; } }

        textarea { 
            width: 100%; height: 50vh; background: #0d1117; color: #e6edf3;
            border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem;
            font-family: 'Fira Code', monospace; font-size: 0.85rem; outline: none;
        }

        .preview-box {
            width: 100%; height: 50vh; background: #0d1117; border: 1px solid var(--border);
            border-radius: 12px; padding: 1.2rem; overflow: auto; white-space: pre;
            font-family: 'Fira Code', monospace; font-size: 0.85rem;
        }

        .json-key { color: var(--j-key); }
        .json-string { color: var(--j-string); }
        .json-num { color: var(--j-num); }
        .json-bool { color: var(--j-bool); }
        .json-null { color: var(--j-null); }

        .btn-group { margin-top: 1.2rem; display: flex; gap: 10px; flex-wrap: wrap; }
        button { 
            padding: 0.7rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; 
            display: flex; align-items: center; gap: 6px; border: none; font-size: 0.85rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-sec { background: #2d334a; color: white; }

        /* Hash UI */
        .hash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
        .hash-card { 
            background: #0d1117; padding: 1.2rem; border-radius: 12px; 
            border: 1px solid var(--border); position: relative;
        }
        .hash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .hash-label { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .copy-icon-btn { 
            background: none; border: none; color: var(--text-muted); cursor: pointer; 
            padding: 4px; border-radius: 4px;
        }
        .copy-icon-btn:hover { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        .hash-val { font-family: 'Fira Code', monospace; font-size: 0.8rem; word-break: break-all; color: var(--text-main); line-height: 1.4; min-height: 1.2rem;}

        footer { background: #070a13; padding: 2rem; text-align: center; border-top: 1px solid var(--border); }
        footer a { color: var(--primary); text-decoration: none; margin: 0 10px; font-size: 0.9rem; }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white;
            padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; display: none; z-index: 1000;
        }
        .sql-keyword { color: #f472b6; font-weight: bold; }
        .sql-string { color: #4ade80; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ISMIDEV PRO</div>
    <button class="tab-btn active" onclick="openTab('jsonPage', this)"><i data-lucide="braces"></i> JSON Tool</button>
    <button class="tab-btn" onclick="openTab('sqlPage', this)"><i data-lucide="database"></i> SQL Formatter</button>
    <button class="tab-btn" onclick="openTab('hashPage', this)"><i data-lucide="fingerprint"></i> Hash Gen</button>
</nav>

<div class="container">
    <div class="card">
        <div id="jsonPage" class="page active">
            <h2 style="margin-top:0"><i data-lucide="zap" style="color:var(--accent)"></i> Smart JSON Beautifier</h2>
            <div class="editor-wrapper">
                <div>
                    <span style="font-size:0.8rem; color:var(--text-muted)">Input (Raw/Messy)</span>
                    <textarea id="jsonInput" placeholder="// Paste JSON here..."></textarea>
                </div>
                <div>
                    <span style="font-size:0.8rem; color:var(--text-muted)">Preview (Highlighted)</span>
                    <div id="jsonPreview" class="preview-box">Result will appear here...</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-primary" onclick="runJsonMagic()"><i data-lucide="wand"></i> Fix & Beautify</button>
                <button class="btn-sec" onclick="undo()" id="undoBtn" disabled><i data-lucide="undo-2"></i> Undo</button>
                <button class="btn-sec" style="margin-left:auto" onclick="copyGeneric('jsonInput', 'JSON')"><i data-lucide="copy"></i> Copy Result</button>
            </div>
        </div>

        <div id="sqlPage" class="page">
            <h2>SQL Formatter</h2>
            <div class="editor-grid">
                <textarea id="sqlInput" placeholder="-- Paste messy SQL here (e.g. SELECT * FROM users WHERE id=1)"></textarea>
                <div id="sqlPreview" class="preview-box">Formatted SQL...</div>
            </div>
            <div class="btn-group">
                <button class="btn-primary" onclick="formatSQL()"><i data-lucide="layout-template"></i> Format SQL</button>
                <button class="btn-sec" onclick="copyValue('sqlInput')">Copy Result</button>
            </div>
        </div>

        <div id="hashPage" class="page">
            <h2 style="margin-top:0"><i data-lucide="shield" style="color:var(--primary)"></i> Hash Generator</h2>
            <div style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:0.8rem; color:var(--text-muted)">Plain Text</span>
                <button class="btn-sec" style="padding: 4px 10px; font-size: 0.7rem;" onclick="pasteToHash()"><i data-lucide="clipboard"></i> Paste</button>
            </div>
            <textarea id="hashInput" style="height: 120px; min-height: 120px;" placeholder="Type or paste text here..." oninput="doHash()"></textarea>
            
            <div class="hash-grid">
                <div class="hash-card">
                    <div class="hash-header">
                        <span class="hash-label">MD5</span>
                        <button class="copy-icon-btn" onclick="copyDirect('md5')"><i data-lucide="copy" size="14"></i></button>
                    </div>
                    <div id="md5" class="hash-val">-</div>
                </div>
                <div class="hash-card">
                    <div class="hash-header">
                        <span class="hash-label">SHA1</span>
                        <button class="copy-icon-btn" onclick="copyDirect('sha1')"><i data-lucide="copy" size="14"></i></button>
                    </div>
                    <div id="sha1" class="hash-val">-</div>
                </div>
                <div class="hash-card">
                    <div class="hash-header">
                        <span class="hash-label">SHA256</span>
                        <button class="copy-icon-btn" onclick="copyDirect('sha256')"><i data-lucide="copy" size="14"></i></button>
                    </div>
                    <div id="sha256" class="hash-val">-</div>
                </div>
                <div class="hash-card">
                    <div class="hash-header">
                        <span class="hash-label">SHA512</span>
                        <button class="copy-icon-btn" onclick="copyDirect('sha512')"><i data-lucide="copy" size="14"></i></button>
                    </div>
                    <div id="sha512" class="hash-val">-</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">Tersalin ke clipboard!</div>

<footer>
    <p>Built for Quality Assurance by <strong>Ismi Azis</strong></p>
    <a href="https://github.com/ismiazis96/" target="_blank">GitHub</a> • 
    <a href="https://www.linkedin.com/in/ismiazis96/" target="_blank">LinkedIn</a>
</footer>

<script>
    lucide.createIcons();

    function openTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // --- Toast Notification ---
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }

    // --- JSON Logic ---
    let history = [""];
    let step = 0;

    function runJsonMagic() {
        const input = document.getElementById('jsonInput');
        const preview = document.getElementById('jsonPreview');
        try {
            let raw = input.value;
            let fixed = raw.replace(/'/g, '"').replace(/,\s*([\]}])/g, '$1').replace(/([{,]\s*)([a-zA-Z0-9_]+?)\s*:/g, '$1"$2":');
            const obj = JSON.parse(fixed);
            const formatted = JSON.stringify(obj, null, 4);
            input.value = formatted;
            preview.innerHTML = colorize(obj);
            history.push(formatted);
            step++;
            document.getElementById('undoBtn').disabled = false;
        } catch(e) { preview.innerHTML = `<span style="color:#ef4444">Error: ${e.message}</span>`; }
    }

    function colorize(json) {
        if (typeof json != 'string') json = JSON.stringify(json, null, 4);
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, function (match) {
            let cls = 'json-num';
            if (/^"/.test(match)) { cls = (/:$/.test(match)) ? 'json-key' : 'json-string'; }
            else if (/true|false/.test(match)) { cls = 'json-bool'; }
            else if (/null/.test(match)) { cls = 'json-null'; }
            return `<span class="${cls}">${match}</span>`;
        });
    }

    function undo() {
        if(step > 0) {
            step--;
            document.getElementById('jsonInput').value = history[step];
            document.getElementById('jsonPreview').innerHTML = "Click Fix to refresh highlight.";
            if(step === 0) document.getElementById('undoBtn').disabled = true;
        }
    }

    // --- Copy & Paste Logic ---
    function copyGeneric(id, name) {
        const val = document.getElementById(id).value;
        if(!val) return;
        navigator.clipboard.writeText(val);
        showToast(`${name} tersalin!`);
    }

    function copyDirect(id) {
        const val = document.getElementById(id).innerText;
        if(!val || val === "-") return;
        navigator.clipboard.writeText(val);
        showToast(`Hash ${id.toUpperCase()} tersalin!`);
    }

    async function pasteToHash() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('hashInput').value = text;
            doHash();
            showToast("Berhasil ditempel!");
        } catch (err) {
            alert("Gagal mengakses clipboard. Pastikan izin diberikan.");
        }
    }

    // --- Hash Logic ---
    function doHash() {
        const v = document.getElementById('hashInput').value;
        if(!v) {
            document.querySelectorAll('.hash-val').forEach(el => el.innerText = "-");
            return;
        }
        document.getElementById('md5').innerText = CryptoJS.MD5(v);
        document.getElementById('sha1').innerText = CryptoJS.SHA1(v);
        document.getElementById('sha256').innerText = CryptoJS.SHA256(v);
        document.getElementById('sha512').innerText = CryptoJS.SHA512(v);
    }

    // --- SQL ---
    function formatSQL() {
        const input = document.getElementById('sqlInput');
        const preview = document.getElementById('sqlPreview');
        let sql = input.value.trim();
        
        // Simple SQL Formatter Logic
        const keywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'GROUP BY', 'ORDER BY', 'LIMIT', 'INSERT INTO', 'UPDATE', 'DELETE', 'JOIN', 'LEFT JOIN', 'SET', 'VALUES'];
        
        let formatted = sql.replace(/\s+/g, ' '); // normalisasi spasi
        keywords.forEach(key => {
            const regex = new RegExp(`\\b${key}\\b`, 'gi');
            formatted = formatted.replace(regex, `\n${key.toUpperCase()}`);
        });

        const result = formatted.trim();
        input.value = result;

        // Highlight Keywords
        let highlighted = result.replace(/\b(SELECT|FROM|WHERE|AND|OR|GROUP BY|ORDER BY|LIMIT|INSERT|UPDATE|DELETE|JOIN|SET|VALUES)\b/g, '<span class="sql-keyword">$1</span>');
        preview.innerHTML = highlighted;
    }

    // --- Utils ---
    function copyValue(id) {
        navigator.clipboard.writeText(document.getElementById(id).value);
        showToast("Copied!");
    }
</script>

</body>
</html>
